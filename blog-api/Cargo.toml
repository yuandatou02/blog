[package]
name = "blog-api"
version = "0.1.0"
edition = "2024"

[dependencies]
dotenv = "0.15.0"
salvo = { version = "0.85.0", features = ["affix-state"] }
sea-orm = { version = "1.1.19", features = [
    "sqlx-postgres",
    "runtime-tokio-native-tls",
    "macros",
    "chrono",
] }
serde = "1.0.228"
tokio = { version = "1.48.0", features = ["full"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
